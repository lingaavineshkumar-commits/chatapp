<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:rgba(255,255,255,0.95);
padding:40px;
border-radius:15px;
width:320px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
background:#f1f1f1;
}

button{
width:100%;
padding:12px;
background:#667eea;
color:white;
border:none;
border-radius:25px;
cursor:pointer;
}

.link{
margin-top:15px;
color:#667eea;
cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
<h2>Create Account</h2>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="signup()">Register</button>

<p class="link" onclick="goLogin()">Back to Login</p>
</div>

<script>
function signup(){

let username = document.getElementById("username").value.trim();
let password = document.getElementById("password").value.trim();

if(username === "" || password === ""){
alert("Fill all fields");
return;
}

/* GET USERS SAFELY */
let allUsers;

try{
allUsers = JSON.parse(localStorage.getItem("allUsers"));
if(!Array.isArray(allUsers)) allUsers = [];
}catch{
allUsers = [];
}

/* CLEAN BAD DATA */
allUsers = allUsers.filter(u => typeof u === "object" && u.username);

/* CHECK DUPLICATE */
let exists = allUsers.find(u => u.username === username);
if(exists){
alert("User already exists");
return;
}

/* ADD USER */
allUsers.push({
username: username,
password: password
});

/* SAVE CLEAN DATA */
localStorage.setItem("allUsers", JSON.stringify(allUsers));

alert("Account created successfully!");

window.location.href = "index.html";
}

function goLogin(){
window.location.href = "index.html";
}
</script>

</body>
</html>
